<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}open-cognition{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dompurify@3/dist/purify.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mermaid/dist/mermaid.min.js"></script>
    <style>
        .htmx-indicator { display: none; }
        .htmx-request .htmx-indicator { display: inline; }
        .markdown-body h1 { font-size: 1.5rem; font-weight: 700; margin: 1rem 0 0.5rem; }
        .markdown-body h2 { font-size: 1.25rem; font-weight: 600; margin: 1rem 0 0.5rem; }
        .markdown-body h3 { font-size: 1.1rem; font-weight: 600; margin: 0.75rem 0 0.25rem; }
        .markdown-body p { margin: 0.5rem 0; }
        .markdown-body ul, .markdown-body ol { margin: 0.5rem 0; padding-left: 1.5rem; }
        .markdown-body ul { list-style-type: disc; }
        .markdown-body ol { list-style-type: decimal; }
        .markdown-body li { margin: 0.25rem 0; }
        .markdown-body strong { font-weight: 700; }
        .markdown-body code { background: #f3f4f6; padding: 0.125rem 0.25rem; border-radius: 0.25rem; font-size: 0.875rem; }
        .markdown-body pre { background: #f3f4f6; padding: 0.75rem; border-radius: 0.5rem; overflow-x: auto; margin: 0.5rem 0; }
        .markdown-body pre code { background: none; padding: 0; }
        .markdown-body table { border-collapse: collapse; margin: 0.5rem 0; }
        .markdown-body th, .markdown-body td { border: 1px solid #e5e7eb; padding: 0.375rem 0.75rem; text-align: left; }
        .markdown-body th { background: #f9fafb; font-weight: 600; }
        .markdown-body blockquote { border-left: 3px solid #d1d5db; padding-left: 0.75rem; color: #6b7280; margin: 0.5rem 0; }
    </style>
    <script>
        mermaid.initialize({ startOnLoad: false, theme: 'neutral' });

        function renderMarkdown(el) {
            const raw = el.getAttribute('data-markdown');
            if (!raw) return;
            const html = marked.parse(raw);
            el.innerHTML = DOMPurify.sanitize(html);
            // Render mermaid blocks
            el.querySelectorAll('code.language-mermaid').forEach((block) => {
                const pre = block.parentElement;
                const div = document.createElement('div');
                div.className = 'mermaid';
                div.textContent = block.textContent;
                pre.replaceWith(div);
            });
            mermaid.run();
        }

        document.addEventListener('DOMContentLoaded', () => {
            document.querySelectorAll('[data-markdown]').forEach(renderMarkdown);
        });
    </script>
</head>
<body class="bg-gray-50 text-gray-900 min-h-screen">
    <nav class="bg-white border-b border-gray-200 px-6 py-3">
        <div class="max-w-5xl mx-auto flex items-center justify-between">
            <a href="/" class="text-lg font-bold text-indigo-600">open-cognition</a>
            <div class="flex gap-6 text-sm">
                <a href="/" class="text-gray-600 hover:text-indigo-600">Dashboard</a>
                <a href="/topics" class="text-gray-600 hover:text-indigo-600">Tópicos</a>
                <a href="/resources" class="text-gray-600 hover:text-indigo-600">Recursos</a>
                <a href="/artifacts" class="text-gray-600 hover:text-indigo-600">Artefatos</a>
                <a href="/doubts" class="text-gray-600 hover:text-indigo-600">Dúvidas</a>
            </div>
        </div>
    </nav>
    <main class="max-w-5xl mx-auto px-6 py-8">
        {% block content %}{% endblock %}
    </main>

    <!-- Artifact modal -->
    <div id="artifact-modal" class="hidden fixed inset-0 z-50">
        <div class="absolute inset-0 bg-black/50" onclick="closeArtifactModal()"></div>
        <div class="absolute inset-4 sm:inset-8 md:inset-12 lg:inset-x-24 lg:inset-y-12 bg-white rounded-xl shadow-xl flex flex-col overflow-hidden">
            <div class="flex items-center justify-between px-6 py-4 border-b border-gray-200">
                <div class="flex items-center gap-2">
                    <span id="modal-type" class="text-xs uppercase bg-gray-100 text-gray-500 px-2 py-0.5 rounded"></span>
                    <h2 id="modal-title" class="font-semibold text-lg"></h2>
                </div>
                <button onclick="closeArtifactModal()" class="text-gray-400 hover:text-gray-600 text-2xl leading-none">&times;</button>
            </div>
            <div id="modal-content" class="flex-1 overflow-y-auto px-6 py-4 markdown-body text-sm text-gray-700"></div>
        </div>
    </div>

    <script>
    function copyId(fullId, el) {
        navigator.clipboard.writeText(fullId).then(() => {
            const original = el.textContent;
            el.textContent = 'copiado!';
            el.classList.add('text-green-600');
            setTimeout(() => {
                el.textContent = original;
                el.classList.remove('text-green-600');
            }, 1000);
        });
    }

    function openArtifactModal(type, title, markdownContent) {
        document.getElementById('modal-type').textContent = type;
        document.getElementById('modal-title').textContent = title;
        const contentEl = document.getElementById('modal-content');
        contentEl.setAttribute('data-markdown', markdownContent);
        renderMarkdown(contentEl);
        document.getElementById('artifact-modal').classList.remove('hidden');
        document.body.style.overflow = 'hidden';
    }

    function closeArtifactModal() {
        document.getElementById('artifact-modal').classList.add('hidden');
        document.body.style.overflow = '';
    }

    document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape') closeArtifactModal();
    });
    </script>
</body>
</html>
